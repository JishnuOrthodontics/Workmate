version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: d4dent-mongodb-local
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    container_name: d4dent-api-gateway-local
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.api-gateway
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/d4dent?authSource=admin
      - PORT=3333
      - PAYMENT_SERVICE_URL=http://payment-service:3003
      - JWT_SECRET=workmate-local-dev-secret
      - INTERNAL_SERVICE_TOKEN=workmate-local-internal-token
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      payment-service:
        condition: service_started

  auth-service:
    container_name: d4dent-auth-service-local
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.auth-service
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/d4dent?authSource=admin
      - JWT_SECRET=workmate-local-dev-secret
      - PORT=3334
    ports:
      - "3334:3334"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy

  payment-service:
    container_name: d4dent-payment-service-local
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.payment-service
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/d4dent?authSource=admin
      - PORT=3003
      - PHONEPE_MERCHANT_ID=PGTESTPAYUAT
      - PHONEPE_SALT_KEY=phonepe-sandbox-key
      - PHONEPE_SALT_INDEX=1
      - PAYOUT_WINDOW_DAYS=7
      - INTERNAL_SERVICE_TOKEN=workmate-local-internal-token
    ports:
      - "3003:3003"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
